<!DOCTYPE html>
<html lang="pt-br">
  <head>
   <title>Pratica02</title>

  <body>
    <h1>Formulário com metodo GET</h1>
      <form method="get">
        <input type="text" name="nome" placeholder="Login:"><br>
        <input type="text" name="nome" placeholder="Senha:"><br>
        <input type="submit" name="enviar" value="enviar"><br>

        
      
    <h1>Formulário com metodo POST</h1>
      <label for="nome">Login:</label>
      <input type="text" id="nome" name="nome" required>
      <label for"nome">Senha:</label>
      <input type="text" id="nome" name="nome" required>
      
      
      </form>
    
  </body>
